<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 1st Anniversary, Cantik! ❤️</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background: #000;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
        }

        #romantic-title {
            position: absolute; top: 8%; font-size: 1.8rem;
            text-align: center; color: #ff007f;
            text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f;
            animation: glow 1.5s ease-in-out infinite alternate;
            z-index: 10;
        }

        canvas { position: absolute; z-index: 5; }

        #interactive-card {
            position: absolute; z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 30px 20px; border-radius: 20px;
            text-align: center; border: 1px solid rgba(255, 255, 255, 0.2);
            width: 85%; max-width: 350px;
            display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #interactive-card h3 { color: #ff007f; margin-bottom: 15px; }
        #interactive-card p { font-size: 1rem; line-height: 1.5; margin-bottom: 20px; min-height: 80px; }
        
        .btn-next {
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            color: white; border: none; padding: 12px 25px;
            border-radius: 50px; cursor: pointer; font-weight: bold;
        }

        #click-me {
            position: absolute; z-index: 30;
            color: #fff; font-weight: bold; text-shadow: 0 0 10px #ff007f;
            cursor: pointer; padding: 25px; border-radius: 50%;
            background: rgba(255, 0, 127, 0.2);
            animation: pulseBtn 2s infinite;
            border: 1px solid #ff007f;
        }

        .photo-tile {
            position: absolute; width: 50px; height: 50px;
            background-size: cover; background-position: center;
            border: 2px solid #ff007f; border-radius: 5px;
            z-index: 40; opacity: 0; transition: all 0.5s ease;
        }

        #dedication-container { position: absolute; bottom: 5%; text-align: center; width: 100%; z-index: 50; }
        .dedication-text { opacity: 0; margin: 5px 0; }

        @keyframes glow { from { text-shadow: 0 0 10px #ff007f; } to { text-shadow: 0 0 30px #ff007f; } }
        @keyframes pulseBtn { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }
        @keyframes fall {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

    </style>
</head>
<body>

    <h1 id="romantic-title">Happy 1st Anniversary</h1>

    <canvas id="heartCanvas"></canvas>
    <div id="click-me">TEKAN DISINI ❤️</div>

    <div id="interactive-card">
        <h3 id="card-title">Hai, Cantik! ❤️</h3>
        <p id="card-msg">Coba klik lanjut terus ya, ada sesuatu buat kamu...</p>
        <button class="btn-next" id="nextBtn">Lanjut</button>
    </div>

    <div id="dedication-container">
        <div id="d1" class="dedication-text">Untuk Asti Rayani,</div>
        <div id="d2" class="dedication-text" style="color:#ff007f;">Terima kasih untuk 365 hari terindah.</div>
    </div>

    <audio id="myAudio" loop>
        <source src="everything u are.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('myAudio');
        const btnNext = document.getElementById('nextBtn');
        let width, height, particles = [];
        let showCircleText = true;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function heartPosition(t) {
            return {
                x: 16 * Math.pow(Math.sin(t), 3),
                y: -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t))
            };
        }

        class Particle {
            constructor() {
                this.t = Math.random() * Math.PI * 2;
                this.basePos = heartPosition(this.t);
                this.randomOffset = Math.random() * 5;
                this.size = Math.random() * 2 + 1;
                this.color = `rgba(255, 0, 127, ${Math.random() * 0.8 + 0.2})`;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                const scale = (Math.min(width, height) / 30) + Math.sin(Date.now() * 0.002 + this.randomOffset) * 1.5;
                this.x = this.basePos.x * scale + width / 2;
                this.y = this.basePos.y * scale + height / 2;
            }
        }

        // Jalankan animasi partikel
        for (let i = 0; i < 250; i++) particles.push(new Particle());
        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });

            if (showCircleText) {
                const text = " MY BINI ❤️ MY PRINCESS ❤️ MY LOVE ❤️ MY WORLD ❤️ ";
                const radius = Math.min(width, height) / 3.5;
                const rotation = Date.now() * 0.0005;
                ctx.font = '13px Courier New';
                ctx.fillStyle = '#fff';
                for (let i = 0; i < text.length; i++) {
                    const angle = i * ((Math.PI * 2) / text.length) + rotation;
                    ctx.save();
                    ctx.translate((width/2) + Math.cos(angle)*radius, (height/2) + Math.sin(angle)*radius);
                    ctx.rotate(angle + Math.PI / 2);
                    ctx.fillText(text[i], 0, 0);
                    ctx.restore();
                }
            }
            requestAnimationFrame(animate);
        }
        animate();

        // LOGIKA KLIK UTAMA
        document.getElementById('click-me').addEventListener('click', function() {
            this.style.display = 'none';
            showCircleText = false;
            audio.play().catch(e => console.log("Audio Play Blocked"));
            
            // Munculkan teks bawah
            document.getElementById('d1').style.opacity = "1";
            document.getElementById('d1').style.transition = "2s";
            setTimeout(() => {
                document.getElementById('d2').style.opacity = "1";
                document.getElementById('d2').style.transition = "2s";
            }, 2000);

            revealPhotos();
        });

        function revealPhotos() {
            const totalPhotos = 18; 
            const scale = 14;
            for (let i = 0; i < totalPhotos; i++) {
                setTimeout(() => {
                    const t = (i / totalPhotos) * Math.PI * 2;
                    const pos = heartPosition(t);
                    const img = document.createElement('div');
                    img.className = 'photo-tile';
                    img.style.backgroundImage = `url('asti1.jpeg')`; 
                    img.style.left = (pos.x * scale + width / 2 - 25) + 'px';
                    img.style.top = (pos.y * scale + height / 2 - 25) + 'px';
                    img.style.opacity = '1';
                    document.body.appendChild(img);

                    if (i === totalPhotos - 1) setTimeout(showCard, 1500);
                }, i * 200);
            }
        }

        // PESAN INTERAKTIF
        const messages = [
            { t: "Gak Terasa Ya?", m: "365 hari udah kita lewatin bareng. Dari April tahun lalu sampai hari ini." },
            { t: "Terima Kasih...", m: "Makasih udah mau sabar ngadepin sifat aku yang kadang nyebelin." },
            { t: "Makasih Juga...", m: "Udah jadi orang pertama yang selalu support aku. Kamu berharga banget." },
            { t: "Tentang Kita", m: "Aku bersyukur banget semesta ngenalin aku sama kamu. Kamu itu 'home' buat aku." },
            { t: "Happy Anniversary! 🎉", m: "Selamat hari jadi yang pertama, Asti Rayani. I love you forever! ❤️" }
        ];

        let step = 0;
        function showCard() {
            const card = document.getElementById('interactive-card');
            card.style.display = 'block';
        }

        btnNext.addEventListener('click', () => {
            if (step < messages.length) {
                document.getElementById('card-title').innerText = messages[step].t;
                document.getElementById('card-msg').innerHTML = messages[step].m;
                step++;
                if(step === messages.length) btnNext.innerText = "Selesai ❤️";
            } else {
                document.getElementById('card-msg').innerHTML = "<b>Tetap sama aku terus ya, Sayang! 🤍</b>";
                btnNext.style.display = 'none';
                setInterval(hujanHati, 300);
            }
        });

        function hujanHati() {
    const heart = document.createElement('div');
    heart.innerHTML = '❤️';
    heart.style.position = 'fixed';
    heart.style.top = '-5vh'; // Mulai dari atas layar
    heart.style.left = Math.random() * 100 + 'vw'; // Posisi acak kiri-kanan
    heart.style.color = '#ff007f';
    heart.style.fontSize = (Math.random() * 20 + 15) + 'px'; // Ukuran acak
    heart.style.zIndex = '200'; // Pastikan di paling depan
    heart.style.pointerEvents = 'none'; // Biar gak ganggu klik
    
    // Ini yang bikin dia gerak jatuh
    heart.style.animation = `fall ${Math.random() * 2 + 3}s linear forwards`;
    
    document.body.appendChild(heart);
    
    // Hapus elemen setelah jatuh biar gak menuhi memori iPhone
    setTimeout(() => {
        heart.remove();
    }, 5000);
}
    </script>
</body>
</html>
