<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 1st Anniversary, Cantik! ❤️</title>
    <style>
        /* --- CSS: Gaya dan Estetika (Nuansa Galaksi & Neon) --- */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Mencegah scroll */
            background: #000; /* Latar belakang hitam pekat */
            /* Tambahkan gambar latar belakang galaksi jika punya URL-nya, atau biarkan hitam */
            /* background-image: url('url_gambar_galaksi_kamu.jpg'); */
            /* background-size: cover; */
            font-family: 'Courier New', Courier, monospace; /* Font gaya coding */
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        /* Teks Judul Atas - Efek Neon Pink */
        #romantic-title {
            position: absolute;
            top: 10%;
            font-size: 2rem;
            text-align: center;
            color: #ff007f; /* Warna Pink Neon */
            text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f, 0 0 30px #ff007f;
            animation: glow 1.5s ease-in-out infinite alternate;
            z-index: 10;
        }

        /* Container untuk Animasi Hati (Canvas) */
        #canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
        }

        /* Teks Ucapan Bawah */
        #dedication-container {
    position: absolute;
    bottom: 5%; /* Saya turunkan dari 10% ke 5% agar lebih mepet ke bawah */
    text-align: center;
    width: 100%;
    z-index: 50; /* Pastikan teks ada di lapisan paling depan */
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); /* Sedikit bayangan agar teks jelas */
    padding-bottom: 20px;
}


        .dedication-text {
            font-size: 1.1rem;
            margin: 10px 0;
            opacity: 0; /* Mulai dengan tidak terlihat */
            animation: fadeIn 2s forwards; /* Animasi muncul */
        }

        #dedication1 { animation-delay: 1s; }
        #dedication2 { animation-delay: 3s; color: #ff007f; } /* Warnai pink untuk penekanan */

        /* Animasi Neon Berdenyut */
        @keyframes glow {
            from { text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f; }
            to { text-shadow: 0 0 20px #ff007f, 0 0 30px #ff007f, 0 0 40px #ff007f; }
        }

        /* Animasi Teks Muncul Perlahan */
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* --- Tombol Kontrol (Optional, seperti di video) --- */
        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            display: flex;
            gap: 10px;
        }

        .btn-audio-toggle, .btn-fullscreen-toggle {
            background: none;
            border: 1px solid #fff;
            color: #fff;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 1rem;
        }

    </style>
</head>
<body>

    <div class="controls">
        <button id="toggle-audio" class="btn-audio-toggle">🔇 Musik</button>
    </div>

    <h1 id="romantic-title">Happy 1st Anniversary</h1>

    <div id="canvas-container">
        <canvas id="heartCanvas"></canvas>
        <div id="click-me" onclick="revealPhotos()">TEKAN DISINI ❤️</div>
    </div>

    <div id="dedication-container">
        <div id="dedication1" class="dedication-text">Untuk Asti Rayani,</div>
        <div id="dedication2" class="dedication-text">Terima kasih untuk 365 hari terindah. Aku sayang kamu! ❤️</div>
    </div>

    <div id="photo-container"></div>

    <audio id="myAudio" loop>
        <source src="everything u are.mp3" type="audio/mpeg">
    </audio>

    <style>
        /* Tambahan Style untuk Tombol & Foto */
        #click-me {
            position: absolute;
            z-index: 30;
            color: #fff;
            font-weight: bold;
            text-shadow: 0 0 10px #ff007f;
            cursor: pointer;
            padding: 20px;
            border-radius: 50%;
            background: rgba(255, 0, 127, 0.1);
            animation: pulseBtn 2s infinite;
        }

        @keyframes pulseBtn {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .photo-tile {
            position: absolute;
            width: 40px;
            height: 40px;
            background-size: cover;
            background-position: center;
            border: 2px solid #ff007f;
            border-radius: 5px;
            z-index: 40;
            opacity: 0;
            transition: all 0.5s ease;
        }
    </style>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];
        let showCircleText = true; // Kontrol teks melingkar

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function heartPosition(t) {
            return {
                x: 16 * Math.pow(Math.sin(t), 3),
                y: -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t))
            };
        }

        class Particle {
            constructor() {
                this.t = Math.random() * Math.PI * 2;
                this.basePos = heartPosition(this.t);
                const scale = Math.min(width, height) / 30;
                this.x = this.basePos.x * scale + width / 2;
                this.y = this.basePos.y * scale + height / 2;
                this.size = Math.random() * 2 + 1;
                this.color = `rgba(255, 0, 127, ${Math.random() * 0.8 + 0.2})`;
                this.randomOffset = Math.random() * 5;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                const scale = (Math.min(width, height) / 30) + Math.sin(Date.now() * 0.002 + this.randomOffset) * 1.5;
                this.x = this.basePos.x * scale + width / 2;
                this.y = this.basePos.y * scale + height / 2;
            }
        }

        function init() {
            for (let i = 0; i < 500; i++) particles.push(new Particle());
            animate();
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });

            if (showCircleText) {
                const text = " MY BINI ❤️ MY PRINCESS ❤️ MY LOVE ❤️ MY WORLD ❤️ ";
                const radius = Math.min(width, height) / 4;
                const rotation = Date.now() * 0.0005;
                ctx.font = '14px Courier New';
                ctx.fillStyle = '#fff';
                for (let i = 0; i < text.length; i++) {
                    const angle = i * ((Math.PI * 2) / text.length) + rotation;
                    const x = (width / 2) + Math.cos(angle) * radius;
                    const y = (height / 2) + Math.sin(angle) * radius;
                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(angle + Math.PI / 2);
                    ctx.fillText(text[i], 0, 0);
                    ctx.restore();
                }
            }
            requestAnimationFrame(animate);
        }

        function revealPhotos() {
            showCircleText = false; // Hapus teks melingkar
            document.getElementById('click-me').style.display = 'none';
            
            const photoContainer = document.getElementById('photo-container');
            const totalPhotos = 20; // Jumlah foto yang mau dimunculkan
            const scale = 12;

            for (let i = 0; i < totalPhotos; i++) {
                setTimeout(() => {
                    const t = (i / totalPhotos) * Math.PI * 2;
                    const pos = heartPosition(t);
                    const img = document.createElement('div');
                    img.className = 'photo-tile';
                    
                    // GANTI 'foto1.jpg' dst dengan file fotomu di folder yang sama
                    img.style.backgroundImage = `url('asti1.jpeg')`; 
                    
                    img.style.left = (pos.x * scale + width / 2 - 20) + 'px';
                    img.style.top = (pos.y * scale + height / 2 - 20) + 'px';
                    img.style.opacity = '1';
                    img.style.transform = 'scale(1.2)';
                    photoContainer.appendChild(img);
                }, i * 200);
            }
        }

        const audio = document.getElementById('myAudio');
        document.getElementById('toggle-audio').addEventListener('click', function() {
            if (audio.paused) { audio.play(); this.innerText = "🔊 Musik"; }
            else { audio.pause(); this.innerText = "🔇 Musik"; }
        });

        init();
    </script>
</body>
